<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCure | AI Toxicity Analysis</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Glassmorphism Effect */
        .glass-panel {
            background: rgba(24, 24, 27, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Custom loading pulse */
        @keyframes subtle-pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .animate-subtle-pulse {
            animation: subtle-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>

<body
    class="bg-[#09090b] text-zinc-300 min-h-screen flex flex-col items-center justify-center p-6 selection:bg-indigo-500/30">
    <div id="root" class="w-full max-w-2xl z-10"></div>

    <div
        class="fixed top-1/4 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-indigo-900/20 rounded-full blur-[120px] pointer-events-none -z-10">
    </div>

    <script type="text/babel">
        function App() {
            const [smiles, setSmiles] = React.useState("");
            const [result, setResult] = React.useState(null);
            const [loading, setLoading] = React.useState(false);
            const [error, setError] = React.useState(null);

            const analyzeCompound = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError(null);
                setResult(null);

                try {
                    const response = await fetch('/predict', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ smiles: smiles })
                    });

                    const data = await response.json();
                    if (!response.ok) throw new Error(data.detail || "Analysis failed");
                    setResult(data);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            // Minimalist dot indicators instead of bulky badges
            const getRiskIndicator = (level) => {
                if (level === "High Risk") return <span class="flex items-center gap-2 text-red-400 font-medium"><span class="w-2 h-2 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.8)]"></span> Critical Risk</span>;
                if (level === "Medium Risk") return <span class="flex items-center gap-2 text-amber-400 font-medium"><span class="w-2 h-2 rounded-full bg-amber-400"></span> Elevated Risk</span>;
                return <span class="flex items-center gap-2 text-emerald-400 font-medium"><span class="w-2 h-2 rounded-full bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.8)]"></span> Low Risk</span>;
            };

            return (
                <div class="w-full animate-fade-in">
                    {/* Header */}
                    <div class="mb-12 text-center">
                        <h1 class="text-3xl font-light text-white tracking-widest uppercase mb-2">CodeCure <span class="font-semibold text-indigo-400">AI</span></h1>
                        <p class="text-sm text-zinc-500 tracking-wide">DEEP GRAPH NEURAL NETWORK • TOX21 PATHWAY ANALYSIS</p>
                    </div>

                    <form onSubmit={analyzeCompound} class="mb-8 relative group">
                        <input
                            type="text"
                            value={smiles}
                            onChange={(e) => setSmiles(e.target.value)}
                            class="w-full bg-transparent border-b border-zinc-700 py-4 pr-32 text-white mono text-lg focus:border-indigo-400 outline-none transition-colors"
                            placeholder="Enter SMILES string..."
                            spellCheck="false"
                        />
                        <button
                            type="submit"
                            disabled={loading || !smiles}
                            class="absolute right-0 top-1/2 -translate-y-1/2 px-6 py-2 bg-white text-black text-sm font-semibold tracking-wide rounded-full hover:bg-zinc-200 disabled:opacity-50 disabled:hover:bg-white transition-all shadow-[0_0_15px_rgba(255,255,255,0.1)]"
                        >
                            {loading ? "RUNNING" : "ANALYZE"}
                        </button>
                    </form>

                    {error && (
                        <div class="text-red-400 text-sm py-3 border-l-2 border-red-500 pl-4 mb-8">
                            {error}
                        </div>
                    )}

                    {loading && (
                        <div class="glass-panel rounded-2xl p-10 text-center animate-subtle-pulse">
                            <p class="text-zinc-400 text-sm tracking-widest uppercase mb-2">Constructing Graph Topology</p>
                            <div class="h-[1px] w-24 bg-indigo-500/50 mx-auto"></div>
                        </div>
                    )}

                    {result && !loading && (
                        <div class="glass-panel rounded-2xl p-8 shadow-2xl transition-all duration-500">
                            {/* Main Result */}
                            <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-10 pb-6 border-b border-zinc-800/50 gap-4">
                                <div>
                                    <p class="text-xs text-zinc-500 uppercase tracking-widest mb-2">Identified Compound</p>
                                    <h2 class="text-4xl font-semibold text-white tracking-tight">{result.compound_name}</h2>
                                </div>
                                <div class="text-right">
                                    {getRiskIndicator(result.risk_level)}
                                </div>
                            </div>

                            {/* Metrics Grid */}
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                                <div>
                                    <p class="text-xs text-zinc-500 uppercase tracking-widest mb-2">SR-p53 Toxicity Probability</p>
                                    <p class="text-4xl font-light text-white">
                                        {(result.toxicity_risk_score * 100).toFixed(2)}<span class="text-xl text-zinc-600">%</span>
                                    </p>
                                </div>
                                <div>
                                    <p class="text-xs text-zinc-500 uppercase tracking-widest mb-2">Input SMILES Geometry</p>
                                    <p class="text-sm text-zinc-400 mono break-all leading-relaxed">
                                        {result.smiles_analyzed}
                                    </p>
                                </div>
                            </div>

                            {/* Scientific Disclaimer */}
                            <div class="mt-8 pt-6 border-t border-zinc-800/50">
                                <p class="text-[10px] leading-relaxed text-zinc-600 uppercase tracking-wide">
                                    * Prediction represents the probability of cellular stress and DNA damage strictly along the SR-p53 bioassay pathway. This model utilizes a multi-target Graph Neural Network. Compounds scoring low in this specific pathway (e.g., Fentanyl) may still present extreme systemic or neurological toxicities.
                                </p>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
