<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCure | AI Toxicity Analysis</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://3Dmol.csb.pitt.edu/build/3Dmol-min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Glassmorphism Effect */
        .glass-panel {
            background: rgba(24, 24, 27, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Custom loading pulse */
        @keyframes subtle-pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .animate-subtle-pulse {
            animation: subtle-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>

<body
    class="bg-[#09090b] text-zinc-300 min-h-screen flex flex-col items-center justify-center p-6 selection:bg-indigo-500/30">
    <div id="root" class="w-full max-w-4xl z-10 transition-all duration-500"></div>

    <canvas id="chem-bg" class="fixed inset-0 pointer-events-none -z-20 opacity-60"></canvas>

    <div
        class="fixed top-1/4 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-indigo-900/20 rounded-full blur-[120px] pointer-events-none -z-10">
    </div>

    <script type="text/babel">
        // 1. THE LANDING PAGE COMPONENT
        function LandingPage({ onLaunch }) {
            return (
                <div class="w-full min-h-[80vh] flex flex-col items-center justify-center animate-fade-in px-4">
                    {/* Hero Section */}
                    <div class="text-center max-w-3xl mb-16">
                        <div class="inline-block mb-4 px-3 py-1 rounded-full border border-indigo-500/30 bg-indigo-500/10 text-indigo-300 text-xs font-semibold tracking-widest uppercase">
                            Phase Zero Drug Discovery
                        </div>
                        <h1 class="text-5xl md:text-7xl font-light text-white tracking-tight mb-6">
                            CodeCure <span class="font-bold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400">AI</span>
                        </h1>
                        <p class="text-lg md:text-xl text-zinc-400 font-light leading-relaxed mb-10">
                            Stop poisoning patients in Phase III. Predict SR-p53 cellular toxicity and human absorption viability <i class="text-zinc-300">in silico</i> before synthesizing a single molecule.
                        </p>
                        <button
                            onClick={onLaunch}
                            class="px-8 py-4 bg-white text-black rounded-full font-semibold tracking-wide hover:scale-105 transition-transform duration-300 shadow-[0_0_30px_rgba(255,255,255,0.2)]"
                        >
                            LAUNCH WORKSPACE
                        </button>
                    </div>

                    {/* Tech Flex Cards */}
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-5xl w-full">
                        <div class="glass-panel p-6 rounded-2xl border border-white/5 hover:border-indigo-500/30 transition-colors">
                            <h3 class="text-white font-medium mb-2">Deep Graph Topology</h3>
                            <p class="text-sm text-zinc-500 leading-relaxed">Utilizing PyTorch Geometric to map 3D atomic bonds and predict DNA damage beyond standard 2D molecular fingerprints.</p>
                        </div>
                        <div class="glass-panel p-6 rounded-2xl border border-white/5 hover:border-cyan-500/30 transition-colors">
                            <h3 class="text-white font-medium mb-2">Rule of 5 Pharmacokinetics</h3>
                            <p class="text-sm text-zinc-500 leading-relaxed">Instant RDKit calculation of Lipophilicity and Molecular Weight to guarantee human biological absorption.</p>
                        </div>
                        <div class="glass-panel p-6 rounded-2xl border border-white/5 hover:border-emerald-500/30 transition-colors">
                            <h3 class="text-white font-medium mb-2">Live PubChem Render</h3>
                            <p class="text-sm text-zinc-500 leading-relaxed">Self-healing API integration that dynamically fetches CIDs and renders interactive 3D structures in real-time.</p>
                        </div>
                    </div>
                </div>
            );
        }

        // 2. YOUR EXISTING ANALYSIS DASHBOARD (Renamed from App to AnalysisWorkspace)
        function AnalysisWorkspace({ onBack }) {
            const [smiles, setSmiles] = React.useState("");
            const [result, setResult] = React.useState(null);
            const [loading, setLoading] = React.useState(false);
            const [error, setError] = React.useState(null);

            const analyzeCompound = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError(null);
                setResult(null);

                try {
                    const response = await fetch('/predict', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ smiles: smiles })
                    });

                    const data = await response.json();
                    if (!response.ok) throw new Error(data.detail || "Analysis failed");
                    setResult(data);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            React.useEffect(() => {
                if (result && result.cid) {
                    setTimeout(() => {
                        const viewerElement = document.getElementById('molecule-viewer');
                        if (viewerElement) {
                            viewerElement.innerHTML = '';
                            const viewer = $3Dmol.createViewer(viewerElement, { backgroundColor: 'transparent' });

                            $3Dmol.download(`cid:${result.cid}`, viewer, {}, function () {
                                viewer.setStyle({}, {
                                    stick: { radius: 0.15, colorscheme: 'Jmol' },
                                    sphere: { scale: 0.3, colorscheme: 'Jmol' }
                                });
                                viewer.spin("y", 0.5);
                                viewer.zoomTo();
                                viewer.render();
                            });

                            viewerElement.addEventListener('wheel', function (e) {
                                e.preventDefault();
                                e.stopPropagation();
                                const zoomFactor = e.deltaY > 0 ? 1.1 : 0.9;
                                viewer.zoom(zoomFactor);
                            }, { passive: false, capture: true });
                        }
                    }, 150);
                }
            }, [result]);

            const getRiskIndicator = (level) => {
                if (level === "High Risk") return <span class="flex items-center gap-2 text-red-400 font-medium"><span class="w-2 h-2 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.8)]"></span> Critical Risk</span>;
                if (level === "Medium Risk") return <span class="flex items-center gap-2 text-amber-400 font-medium"><span class="w-2 h-2 rounded-full bg-amber-400"></span> Elevated Risk</span>;
                return <span class="flex items-center gap-2 text-emerald-400 font-medium"><span class="w-2 h-2 rounded-full bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.8)]"></span> Low Risk</span>;
            };

            return (
                <div class="w-full animate-fade-in mx-auto relative">
                    {/* Back Button */}
                    <button onClick={onBack} class="absolute -top-12 left-0 text-zinc-500 hover:text-white text-sm flex items-center gap-2 transition-colors">
                        &larr; Back to Home
                    </button>

                    {/* Header */}
                    <div class="mb-12 text-center mt-8">
                        <h1 class="text-3xl font-light text-white tracking-widest uppercase mb-2">CodeCure <span class="font-semibold text-indigo-400">AI</span></h1>
                        <p class="text-sm text-zinc-500 tracking-wide">DEEP GRAPH NEURAL NETWORK • TOX21 PATHWAY ANALYSIS</p>
                    </div>

                    <form onSubmit={analyzeCompound} class="mb-8 relative group max-w-2xl mx-auto">
                        <input
                            type="text"
                            value={smiles}
                            onChange={(e) => setSmiles(e.target.value)}
                            class="w-full bg-transparent border-b border-zinc-700 py-4 pr-32 text-white mono text-lg focus:border-indigo-400 outline-none transition-colors"
                            placeholder="Enter SMILES string..."
                            spellCheck="false"
                        />
                        <button
                            type="submit"
                            disabled={loading || !smiles}
                            class="absolute right-0 top-1/2 -translate-y-1/2 px-6 py-2 bg-white text-black text-sm font-semibold tracking-wide rounded-full hover:bg-zinc-200 disabled:opacity-50 disabled:hover:bg-white transition-all shadow-[0_0_15px_rgba(255,255,255,0.1)]"
                        >
                            {loading ? "RUNNING" : "ANALYZE"}
                        </button>
                    </form>

                    {error && (
                        <div class="text-red-400 text-sm py-3 border-l-2 border-red-500 pl-4 mb-8 max-w-2xl mx-auto">
                            {error}
                        </div>
                    )}

                    {loading && (
                        <div class="glass-panel rounded-2xl p-10 text-center max-w-2xl mx-auto">
                            <p class="text-zinc-400 text-sm tracking-widest uppercase mb-2 animate-pulse">Constructing Graph Topology</p>
                            <div class="h-[1px] w-24 bg-indigo-500/50 mx-auto"></div>
                        </div>
                    )}

                    {result && !loading && (
                        <div class="glass-panel rounded-2xl p-8 shadow-2xl transition-all duration-500">
                            <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-10 pb-6 border-b border-zinc-800/50 gap-4">
                                <div>
                                    <p class="text-xs text-zinc-500 uppercase tracking-widest mb-2">Identified Compound</p>
                                    <h2 class="text-4xl font-semibold text-white tracking-tight">{result.compound_name}</h2>
                                </div>
                                <div class="text-right">
                                    {getRiskIndicator(result.risk_level)}
                                </div>
                            </div>

                            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-8">
                                <div class="lg:col-span-2 flex flex-col gap-6 pr-4">
                                    <div>
                                        <p class="text-xs text-zinc-500 uppercase tracking-widest mb-2">SR-p53 Toxicity Probability</p>
                                        <p class="text-5xl font-light text-white mb-2">
                                            {(result.toxicity_risk_score * 100).toFixed(2)}<span class="text-2xl text-zinc-600">%</span>
                                        </p>
                                    </div>

                                    <div class="bg-black/20 rounded-xl p-5 border border-white/5 shadow-inner mt-2">
                                        <div class="flex justify-between items-center mb-4 border-b border-white/5 pb-3">
                                            <p class="text-[11px] text-zinc-400 uppercase tracking-widest font-semibold">Pharmacokinetics (Rule of 5)</p>
                                            {result.pharmacokinetics.lipinski_pass ?
                                                <span class="text-[10px] bg-emerald-500/10 text-emerald-400 px-2 py-1 rounded border border-emerald-500/20 uppercase tracking-wider">Viable Drug</span> :
                                                <span class="text-[10px] bg-red-500/10 text-red-400 px-2 py-1 rounded border border-red-500/20 uppercase tracking-wider">Absorption Risk</span>
                                            }
                                        </div>

                                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                                            <div>
                                                <p class="text-[10px] text-zinc-500 uppercase tracking-wider mb-1">Weight</p>
                                                <p class={`text-lg font-medium ${result.pharmacokinetics.weight > 500 ? 'text-red-400' : 'text-zinc-200'}`}>{result.pharmacokinetics.weight} <span class="text-xs text-zinc-600">Da</span></p>
                                                <p class="text-[9px] text-zinc-600 mt-1">&le; 500</p>
                                            </div>
                                            <div>
                                                <p class="text-[10px] text-zinc-500 uppercase tracking-wider mb-1">Lipophilicity</p>
                                                <p class={`text-lg font-medium ${result.pharmacokinetics.logp > 5 ? 'text-red-400' : 'text-zinc-200'}`}>{result.pharmacokinetics.logp}</p>
                                                <p class="text-[9px] text-zinc-600 mt-1">LogP &le; 5</p>
                                            </div>
                                            <div>
                                                <p class="text-[10px] text-zinc-500 uppercase tracking-wider mb-1">H-Donors</p>
                                                <p class={`text-lg font-medium ${result.pharmacokinetics.h_donors > 5 ? 'text-red-400' : 'text-zinc-200'}`}>{result.pharmacokinetics.h_donors}</p>
                                                <p class="text-[9px] text-zinc-600 mt-1">&le; 5</p>
                                            </div>
                                            <div>
                                                <p class="text-[10px] text-zinc-500 uppercase tracking-wider mb-1">H-Acceptors</p>
                                                <p class={`text-lg font-medium ${result.pharmacokinetics.h_acceptors > 10 ? 'text-red-400' : 'text-zinc-200'}`}>{result.pharmacokinetics.h_acceptors}</p>
                                                <p class="text-[9px] text-zinc-600 mt-1">&le; 10</p>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="mt-2">
                                        <p class="text-[10px] text-zinc-500 uppercase tracking-widest mb-2">Input Geometry</p>
                                        <p class="text-xs text-zinc-400 mono break-all leading-relaxed">
                                            {result.smiles_analyzed}
                                        </p>
                                    </div>
                                </div>

                                <div class="h-64 lg:h-auto min-h-[240px] bg-black/40 rounded-xl border border-white/10 relative overflow-hidden group shadow-inner">
                                    <div class="absolute top-3 left-3 z-10">
                                        <p class="text-[10px] text-zinc-400 uppercase tracking-widest font-semibold drop-shadow-md">Interactive 3D Model</p>
                                    </div>

                                    {result.compound_name === "Unknown / Novel Compound" ? (
                                        <div class="absolute inset-0 flex items-center justify-center p-6 text-center">
                                            <p class="text-zinc-600 text-xs">3D rendering unavailable for uncatalogued novel SMILES strings.</p>
                                        </div>
                                    ) : (
                                        <div id="molecule-viewer" class="absolute inset-0 cursor-move"></div>
                                    )}

                                    <div class="absolute bottom-3 right-3 z-10 opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none">
                                        <p class="text-[9px] text-zinc-300 uppercase tracking-widest bg-black/60 px-2 py-1 rounded backdrop-blur-md border border-white/10">
                                            Drag to Rotate • Scroll to Zoom
                                        </p>
                                    </div>
                                </div>
                            </div>
                            <div class="mt-4 pt-6 border-t border-zinc-800/50">
                                <p class="text-[10px] leading-relaxed text-zinc-600 uppercase tracking-wide">
                                    * Prediction represents the probability of cellular stress and DNA damage strictly along the SR-p53 bioassay pathway. This model utilizes a multi-target Graph Neural Network.
                                </p>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // 3. THE MASTER CONTROLLER
        function App() {
            // This state decides which page to show!
            const [currentView, setCurrentView] = React.useState('landing');

            if (currentView === 'landing') {
                return <LandingPage onLaunch={() => setCurrentView('workspace')} />;
            }

            return <AnalysisWorkspace onBack={() => setCurrentView('landing')} />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <script>
        const canvas = document.getElementById('chem-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray = [];

        // Mouse interaction radius
        const mouse = { x: null, y: null, radius: 120 };

        window.addEventListener('mousemove', (event) => {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        });

        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x; this.y = y;
                this.directionX = directionX; this.directionY = directionY;
                this.size = size; this.color = color;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
            update() {
                // Bounce off edges
                if (this.x > canvas.width || this.x < 0) this.directionX = -this.directionX;
                if (this.y > canvas.height || this.y < 0) this.directionY = -this.directionY;

                // Collision detection - mouse position / particle position
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);

                // If mouse is close, gently push atoms away (magnetic repulsion)
                if (distance < mouse.radius + this.size) {
                    if (mouse.x < this.x && this.x < canvas.width - this.size * 10) this.x += 1.5;
                    if (mouse.x > this.x && this.x > this.size * 10) this.x -= 1.5;
                    if (mouse.y < this.y && this.y < canvas.height - this.size * 10) this.y += 1.5;
                    if (mouse.y > this.y && this.y > this.size * 10) this.y -= 1.5;
                }

                // Move particle
                this.x += this.directionX;
                this.y += this.directionY;
                this.draw();
            }
        }

        function init() {
            particlesArray = [];
            let numberOfParticles = (canvas.height * canvas.width) / 12000;
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 1;
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * 0.5) - 0.25;
                let directionY = (Math.random() * 0.5) - 0.25;
                let color = 'rgba(129, 140, 248, 0.4)'; // Tailwind indigo-400
                particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, innerWidth, innerHeight);

            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connect();
        }

        // Draw the chemical bonds
        function connect() {
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x)) +
                        ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));

                    // If atoms are close enough, draw a bond between them
                    if (distance < (canvas.width / 10) * (canvas.height / 10)) {
                        let opacityValue = 1 - (distance / 20000);
                        ctx.strokeStyle = `rgba(129, 140, 248, ${opacityValue * 0.3})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        // Stop mouse interaction when leaving the window
        window.addEventListener('mouseout', function () {
            mouse.x = undefined;
            mouse.y = undefined;
        });

        init();
        animate();
    </script>

</body>

</html>
